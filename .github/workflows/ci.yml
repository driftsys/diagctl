name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  # Compile-verify the static musl release targets on every PR, so a future
  # musl-incompatible dependency is caught here instead of at release-tag time.
  # Uses the same cargo-zigbuild cross-compiler as the cargo-dist release build.
  musl-build:
    name: musl static build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-zigbuild --version 0.22.3 --locked
      - run: cargo zigbuild --release --target x86_64-unknown-linux-musl
      - run: cargo zigbuild --release --target aarch64-unknown-linux-musl
